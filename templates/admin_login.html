{% extends 'base.html' %}
{% block title %}Admin Login · SecureVote{% endblock %}
{% block content %}
<div class="row justify-content-center min-vh-100 align-items-center py-5">
  <div class="col-md-5">
    <div class="card bg-black border border-warning rounded-4 shadow-lg animate__animated animate__fadeInDown">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <svg width="60" height="60" class="mb-3 animate__animated animate__pulse animate__infinite">
            <use href="#security-shield" />
          </svg>
          <h2 class="card-title text-warning fw-bold mb-3 animate__animated animate__fadeIn animate__delay-1s">
            Admin Portal
          </h2>
          <p class="text-muted animate__animated animate__fadeIn animate__delay-1s">
            Secure access for election administrators
          </p>
        </div>

        <form method="POST" class="needs-validation" novalidate>
          <div class="form-floating mb-4 animate__animated animate__fadeInLeft animate__delay-1s">
            <input type="text" class="form-control bg-dark text-light border-warning" id="username" name="username"
              required placeholder="Username">
            <label for="username" class="text-muted">
              <i class="fas fa-user-shield me-2"></i>Username
            </label>
            <div class="invalid-feedback text-warning">
              Please enter your username
            </div>
          </div>

          <div class="form-floating mb-4 animate__animated animate__fadeInRight animate__delay-1s">
            <input type="password" class="form-control bg-dark text-light border-warning" id="password" name="password"
              required placeholder="Password">
            <label for="password" class="text-muted">
              <i class="fas fa-lock me-2"></i>Password
            </label>
            <div class="invalid-feedback text-warning">
              Please enter your password
            </div>
          </div>

          <div class="d-grid animate__animated animate__fadeInUp animate__delay-2s">
            <button class="btn btn-warning btn-lg position-relative overflow-hidden">
              <span class="d-flex align-items-center justify-content-center">
                <i class="fas fa-right-to-bracket me-2"></i>
                <span>Login to Dashboard</span>
              </span>
            </button>
          </div>
        </form>

        <div class="text-center mt-4 animate__animated animate__fadeIn animate__delay-2s">
          <p class="text-muted small">
            <i class="fas fa-shield-alt text-warning me-2"></i>
            Secured with advanced encryption
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const form = document.querySelector('form');
    const inputs = form.querySelectorAll('input');

    // Add floating label animation
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.classList.add('focused');
      });
      input.addEventListener('blur', () => {
        if (!input.value) {
          input.parentElement.classList.remove('focused');
        }
      });
    });

    // Form validation
    form.addEventListener('submit', function (event) {
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      }
      form.classList.add('was-validated');
    });

    // Add ripple effect to button
    const button = form.querySelector('button');
    button.addEventListener('click', function (e) {
      const rect = button.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const ripple = document.createElement('span');
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      ripple.className = 'ripple';

      button.appendChild(ripple);
      setTimeout(() => ripple.remove(), 1000);
    });
  });
</script>
{% endblock %}
