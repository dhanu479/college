{% extends 'base.html' %}
{% block title %}Register · SecureVote{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card bg-black border border-warning rounded-4 shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Register</h3>
        <form method="POST" enctype="multipart/form-data">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" name="first_name" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" name="last_name" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" name="email" required placeholder="example@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">UUCMS Number</label>
            <input type="text" class="form-control" name="uucms_number" placeholder="e.g., U19MM23S0012" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Send OTP Verification to</label>
            <div class="d-flex gap-4 mt-1">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="otp_method" value="email" id="otpEmail" checked>
                <label class="form-check-label py-0 px-2 border-0 m-0" for="otpEmail">Email</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="otp_method" value="mobile" id="otpMobile">
                <label class="form-check-label py-0 px-2 border-0 m-0" for="otpMobile">Mobile Number</label>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Country</label>
              <select class="form-select" name="country_code" id="country_code" required>
                <option value="+91">India (+91)</option>
                <option value="+1">USA (+1)</option>
                <option value="+44">UK (+44)</option>
                <option value="+81">Japan (+81)</option>
                <option value="+86">China (+86)</option>
                <option value="+61">Australia (+61)</option>
              </select>
            </div>
            <div class="col-md-8 mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" name="phone_number" pattern="\d{10}"
                title="Please enter a valid 10-digit phone number" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control" name="dob" required max="{{ datetime.now().year - 18 }}-12-31">
          </div>
          <div class="mb-3">
            <label class="form-label">Face Image (front-facing)</label>
            <input type="file" class="form-control" name="face_image" accept="image/*" capture="user" required>
          </div>
          <button class="btn btn-warning w-100">Register</button>
        </form>
        <div class="text-center mt-3">
          <small>Already registered? <a class="link-warning" href="{{ url_for('login') }}">Login</a></small>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
