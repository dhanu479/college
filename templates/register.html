{% extends 'base.html' %}
{% block title %}Register · SecureVote{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card bg-black border border-warning rounded-4 shadow-sm">
      <div class="card-body">
        <h3 class="card-title mb-3">Register</h3>
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" name="email" required placeholder="example@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Voter ID</label>
            <input type="text" class="form-control" name="voter_id" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Aadhaar</label>
            <input type="text" class="form-control" name="aadhaar" pattern="\d{12}" title="Please enter a valid 12-digit Aadhaar number" required>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Country</label>
              <select class="form-select" name="country_code" id="country_code" required>
                <option value="+91">India (+91)</option>
                <option value="+1">USA (+1)</option>
                <option value="+44">UK (+44)</option>
                <option value="+81">Japan (+81)</option>
                <option value="+86">China (+86)</option>
                <option value="+61">Australia (+61)</option>
              </select>
            </div>
            <div class="col-md-8 mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" class="form-control" name="phone_number" pattern="\d{10}" title="Please enter a valid 10-digit phone number" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Date of Birth</label>
            <input type="date" class="form-control" name="dob" required max="{{ datetime.now().year - 18 }}-12-31">
          </div>
          <div class="mb-3">
            <label class="form-label">Face Image (front-facing)</label>
            <input type="file" class="form-control" name="face_image" accept="image/*" capture="user" required>
          </div>
          <button class="btn btn-warning w-100">Register</button>
        </form>
        <div class="text-center mt-3">
          <small>Already registered? <a class="link-warning" href="{{ url_for('login') }}">Login</a></small>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
